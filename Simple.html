<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: background 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        color 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 浅色模式 */
        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --card: #ffffff;
            --btn: #e8e8ed;
            --btn-text: #86868b;
            --active: #0071e3;
            --gray-text: #86868b;
            --hover-light: rgba(0, 113, 227, 0.15);
        }

        /* 🔥 黑色炫彩模式（替代原黑夜+炫彩，作为默认） */
        [data-theme="dark"] {
            --bg: linear-gradient(135deg, #121212, #1a1a2e);
            --text: #ffffff;
            --card: rgba(30, 30, 40, 0.85);
            --btn: rgba(40, 40, 60, 0.6);
            --btn-text: #c0c0c8;
            --active: #ff6ac1;
            --gray-text: #a0a0b8;
            --hover-light: rgba(255, 106, 193, 0.25);
            background: linear-gradient(90deg, #ff6ac1, #7b61ff, #37c3ff, #2affd0);
            background-size: 400% 400%;
            animation: rainbowFlow 8s linear infinite;
        }
        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 主题切换 */
        #themeToggle {
            position: absolute;
            top: 24px;
            left: 32px;
            background: transparent;
            color: var(--btn-text);
            border: none;
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 14px;
            cursor: pointer;
        }
        #themeToggle:hover {
            background: var(--hover-light);
            color: var(--active);
        }

        .wrapper {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 36px;
            align-items: center;
        }

        .title {
            font-size: 64px;
            font-weight: 700;
            letter-spacing: -1.5px;
            color: var(--text);
        }

        /* 搜索框容器 */
        .search-bar {
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            transition: transform 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 🔥 左侧扁平化搜索按钮 */
        .search-btn {
            position: absolute;
            left: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--active);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 2;
        }
        /* 💧 LiquidGlass 液态玻璃光效 */
        .search-btn:hover {
            background: var(--hover-light);
            transform: scale(1.08);
            filter: brightness(1.3);
        }

        /* 🔥 右侧清除按钮（X）+ 圆圈悬浮效果 + 同步Q弹 */
        .clear-btn {
            position: absolute;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--btn-text);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 统一过渡效果，避免多属性冲突 */
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 2;
            opacity: 0;
            pointer-events: none;
            /* 关键：防止按钮内容溢出/重复渲染 */
            overflow: hidden;
            /* 修正X图标居中，避免偏移 */
            line-height: 1;
        }
        .clear-btn.show {
            opacity: 1;
            pointer-events: all;
        }
        .clear-btn:hover {
            background: var(--hover-light);
            transform: scale(1.08);
            color: var(--active);
            filter: brightness(1.3);
            /* 增加光晕，强化LiquidGlass效果 */
            box-shadow: 0 0 12px rgba(255, 106, 193, 0.2);
        }

        /* 主输入框 */
        #query {
            width: 100%;
            height: 56px;
            padding: 0 56px;
            font-size: 17px;
            border: none;
            border-radius: 28px;
            background: var(--card);
            color: var(--text);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            outline: none;
            transition: transform 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 🔥 隐藏浏览器默认的搜索框清除按钮 */
        #query::-webkit-search-cancel-button {
            -webkit-appearance: none;
            appearance: none;
            display: none;
        }

        #query::-webkit-search-decoration {
            -webkit-appearance: none;
            appearance: none;
        }

        /* 引擎容器 - 泡泡流动效果基座 */
        .engines {
            position: relative;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            padding: 6px;
        }

        /* 🔥 泡泡流动高亮层 */
        .bubble-highlight {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 0;
            height: 40px;
            background: var(--hover-light);
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            opacity: 0;
            z-index: 0;
            backdrop-filter: blur(10px);
        }

        /* 引擎按钮 */
        .engine {
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 20px;
            background: transparent;
            color: var(--btn-text);
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            z-index: 1;
        }
        .engine.active {
            background: var(--active);
            color: #fff;
            filter: brightness(1.15);
        }
        .engine:hover {
            color: var(--active);
        }

        /* 底部署名 */
        .designer {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--gray-text);
            font-weight: 400;
            opacity: 0.7;
        }

        /* 动效类 - 同步应用到搜索容器，让按钮和输入框一起动 */
        .input-jump {
            transform: scale(1.025) !important;
        }
        .input-back {
            transform: scale(0.98) !important;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 48px;
            }
            #query {
                height: 50px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <button id="themeToggle">白天模式</button>

    <div class="wrapper">
        <div class="title">Search</div>
        
        <div class="search-bar" id="searchContainer">
            <button class="search-btn" id="searchBtn">🔍</button>
            <input type="search" id="query" placeholder="搜索..." autocomplete="off">
            <button class="clear-btn" id="clearBtn">✕</button>
        </div>

        <div class="engines">
            <div class="bubble-highlight" id="bubble"></div> <!-- 泡泡动画层 -->
            <button class="engine" data-url="https://www.google.com/search?q=">Google</button>
            <button class="engine active" data-url="https://cn.bing.com/search?q=">必应</button>
            <button class="engine" data-url="https://www.baidu.com/s?wd=">百度</button>
            <button class="engine" data-url="https://search.bilibili.com/all?keyword=">Bilibili</button>
        </div>
    </div>

    <div class="designer">Designed by Shawnkt in his home</div>

    <script>
        // 🔥 双模式切换：黑色炫彩(dark) ↔ 白天(light)
        const toggle = document.getElementById('themeToggle');
        toggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            if (current === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                toggle.textContent = '黑夜模式';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                toggle.textContent = '白天模式';
            }
        });

        // 搜索核心
        const input = document.getElementById('query');
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');
        const searchContainer = document.getElementById('searchContainer'); // 搜索容器
        const btns = document.querySelectorAll('.engine');
        const bubble = document.getElementById('bubble');
        let currentUrl = document.querySelector('.engine.active').dataset.url;

        // 清除按钮显示/隐藏
        input.addEventListener('input', () => {
            clearBtn.classList.toggle('show', input.value.trim() !== '');
            // 给整个容器加Q弹动效，让按钮和输入框一起动
            searchContainer.classList.add('input-jump');
            setTimeout(() => searchContainer.classList.remove('input-jump'), 170);
        });

        // 清除内容
        clearBtn.addEventListener('click', () => {
            input.value = '';
            clearBtn.classList.remove('show');
            input.focus();
        });

        // 🔥 泡泡连起来又断开的动画
        btns.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                const rect = btn.getBoundingClientRect();
                const parentRect = btn.parentElement.getBoundingClientRect();
                
                bubble.style.left = `${rect.left - parentRect.left}px`;
                bubble.style.width = `${rect.width}px`;
                bubble.style.opacity = '1';
            });

            btn.addEventListener('mouseleave', () => {
                bubble.style.opacity = '0';
                bubble.style.width = '0';
            });

            // 点击切换引擎
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentUrl = btn.dataset.url;
            });
        });

        // 搜索执行
        function doSearch() {
            const val = input.value.trim();
            if (val) window.open(currentUrl + encodeURIComponent(val), '_blank');
        }

        searchBtn.addEventListener('click', doSearch);

        // 键盘动效 - 应用到容器，让按钮同步动
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') { doSearch(); return; }
            if (e.key !== 'Backspace') {
                searchContainer.classList.add('input-jump');
                setTimeout(() => searchContainer.classList.remove('input-jump'), 170);
            }
            if (e.key === 'Backspace') {
                searchContainer.classList.add('input-back');
                setTimeout(() => searchContainer.classList.remove('input-back'), 140);
            }
        });
    </script>
</body>
</html>
